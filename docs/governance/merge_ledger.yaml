# Append-only logical record of merges into main, governed by the Merge Governor.
# A repository YAML file alone is NOT immutable evidence: where Guardian's signed
# evidence system exists, attest the merge event externally. This ledger is the
# human-readable index, not the system of record.
#
# This ledger begins at the governance baseline. Pre-governance merges into main
# (PRs up to #53) predate the steward and are catalogued in branch_inventory.yaml
# rather than re-litigated here.

    alternatives: [open-quantum-safe/oqs-provider, pq-crystals/pqclean, cloudflare/circl, openssl/openssl, signalapp/libsignal, jedisct1/libsodium, hacl-star/hacl-star, FiloSottile/age, sequoia-pgp/sequoia, opendnssec/SoftHSMv2, p11-glue/p11-kit]
    capabilities: [crypto.inventory, crypto.algorithm-policy, crypto.certificate-inventory, crypto.protocol-inventory, crypto.migration-plan, crypto.hybrid-test, crypto.downgrade-detect, crypto.rotate, crypto.rewrap, crypto.retire, crypto.verify]

  - id: key_custody

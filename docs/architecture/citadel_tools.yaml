# Guardian Crown Citadel — open-source tool map (candidate registry).
#
# Rule (same as components.yaml): exactly ONE authoritative owner per production function. The
# remaining tools are independent verifiers, specialist adapters, migration tools or LABORATORY
# tools — they do NOT run in the same production runtime as the owner, and they never become a
# second owner of the same function. (tests/test_citadel_tools_manifest.py enforces this.)
#
# serves: the Citadel system id (docs/architecture/citadel_capabilities.yaml) this category backs.
# placement: production | verifier | laboratory | migration | development
version: 0.1.0
principle: one_authoritative_owner_per_function

categories:
  - id: hardware_trust
    serves: root_of_trust
    function: hardware trust and measured boot
    owner: tpm2-software/tpm2-tools
    placement: production
    alternatives: [keylime/keylime, linux-ima, integrity-evm, swtpm, spiffe/spire, coreboot, fwupd/fwupd, chipsec/chipsec, aide, dm-verity, fs-verity]
    capabilities: [platform.inventory, platform.enrol, platform.attest, platform.measurement, platform.drift, platform.revoke, platform.quarantine, firmware.verify, boot.verify, kernel.verify, filesystem.integrity]

  - id: confidential_computing
    serves: confidential_execution
    function: confidential / attested execution
    owner: confidential-containers/confidential-containers
    placement: production
    alternatives: [kata-containers/kata-containers, gramineproject/gramine, enarx/enarx, occlum/occlum, openenclave/openenclave, firecracker-microvm/firecracker, cloud-hypervisor/cloud-hypervisor]
    capabilities: [confidential.worker-create, confidential.attest, confidential.secret-release, confidential.execute, confidential.evidence, confidential.destroy]

  - id: post_quantum_crypto
    serves: crypto_agility
    function: post-quantum and cryptographic agility

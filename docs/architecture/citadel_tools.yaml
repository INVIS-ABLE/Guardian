    placement: production
    alternatives: [hashicorp/vault, latchset/tang, cossacklabs/themis, opendnssec/SoftHSMv2]
    capabilities: [key.class, key.custodian, key.threshold, key.ceremony, key.rotate, key.revoke, key.offline-recovery]

  - id: formal_state_verification

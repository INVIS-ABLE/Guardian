# Sample unified security-event stream for the INVISABLE estate.
#
# One durable, ordered stream fusing all eight sources into the canonical SecurityEvent shape —
# the "leaked CI token" incident from docs/sovereign_ops_plane.md told as events the nervous
# system would correlate: a token used from a new network, a force-push, a burst of policy
# denials (the spike), a runtime detection, anomalous egress, then containment + reasoning.
#
# Run:
#   guardian events-tail    event_fabric/invisable-stream.yaml --min-severity high
#   guardian events-stats   event_fabric/invisable-stream.yaml --by source
#   guardian events-spikes  event_fabric/invisable-stream.yaml --window 60 --threshold 3 --outcome deny
#   guardian events-verify  event_fabric/invisable-stream.yaml
#
# Metadata only: each event records THAT something happened (a denial, a syscall), never message
# bodies or key material. The fabric is structurally outside private content.
events:
  - { id: "build:img:messaging:1042", ts: "2026-06-22T21:55:00Z", source: build, action: "build.image_signed",
      severity: info, outcome: success, actor: "id:ci-token", target: "img:messaging", labels: {digest: "sha256:abcd"} }
  - { id: "identity:sess:7741", ts: "2026-06-22T22:00:00Z", source: identity, action: "auth.session_new_asn",
      severity: medium, outcome: observed, actor: "id:ci-token", target: "svc:messaging-relay", labels: {asn: "AS65001"} }
  - { id: "gh:del:9920", ts: "2026-06-22T22:00:30Z", source: github, action: "pr.force_push",
      severity: high, outcome: observed, actor: "id:ci-token", target: "repo:guardian", labels: {ref: "refs/heads/main"} }
  - { id: "opa:dec:5001", ts: "2026-06-22T22:01:00Z", source: opa, action: "policy.production_deploy",
      severity: high, outcome: deny, actor: "id:ci-token", target: "svc:messaging-relay" }
  - { id: "opa:dec:5002", ts: "2026-06-22T22:01:20Z", source: opa, action: "policy.production_deploy",
      severity: high, outcome: deny, actor: "id:ci-token", target: "svc:messaging-relay" }
  - { id: "opa:dec:5003", ts: "2026-06-22T22:01:40Z", source: opa, action: "policy.production_deploy",
      severity: high, outcome: deny, actor: "id:ci-token", target: "svc:messaging-relay" }
  - { id: "falco:evt:3310", ts: "2026-06-22T22:02:00Z", source: falco, action: "runtime.shell_in_container",
      severity: critical, outcome: detected, target: "svc:messaging-relay", labels: {rule: "Terminal shell in container"} }
  - { id: "cilium:flow:8830", ts: "2026-06-22T22:02:10Z", source: cilium, action: "network.unexpected_egress",
      severity: high, outcome: blocked, actor: "id:ci-token", target: "svc:messaging-relay", labels: {dst: "203.0.113.9"} }
  - { id: "temporal:wf:2201", ts: "2026-06-22T22:02:30Z", source: temporal, action: "workflow.containment_started",
      severity: info, outcome: success, target: "svc:messaging-relay", labels: {workflow: "isolate_workload"} }
  - { id: "model:call:6655", ts: "2026-06-22T22:02:40Z", source: model, action: "model.hypothesis",
      severity: info, outcome: success, actor: "agent:brain", labels: {model: "guardian-reasoner"} }

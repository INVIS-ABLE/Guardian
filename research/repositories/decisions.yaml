# research/repositories/decisions.yaml
# GENERATED by scratchpad/gen_catalogue.py — do not edit by hand; regenerate.
#
# LIMITATION: GitHub API / network access was not available when this was produced.
# Quantitative metadata (default_branch, evaluated_commit, latest_release, archived,
# exact licence, dependency/model licences, maintenance signals) is therefore marked
# `pending_live_discovery: true` with a reproducible discovery command. Per the
# platform charter, metadata is never fabricated. The DECISION fields are architectural
# judgements made from each project's category and purpose, and are actionable now.

schema_version: 1
# Decision vocabulary: retain | adopt | adapt | integrate | federate | isolate | benchmark | reference | defer | reject | self
category_defaults:
  A_agentic_security:
    title: "Agentic-security / autonomous offensive systems"
    default_decision: reference
    integration_option: research_reference
    isolation_tier: ephemeral_sandbox
    note: "Autonomous offensive capability is high-risk. Guardian is the control plane; these are studied for architecture/validation ideas, never enabled as unrestricted attack workflows (charter rules 5,6,7)."
  B_agent_governance_mcp:
    title: "Agent governance / control planes / MCP security / agent firewalls"
    default_decision: benchmark
    integration_option: benchmark_or_compare
    isolation_tier: n/a
    note: "Compared directly against Guardian's router, policy gate, capability boundary and MCP exposure. Guardian must not create a second, conflicting control authority — these inform, they do not replace the policy gate."
  C_ai_model_eval:
    title: "AI / LLM / model / agent security evaluation"
    default_decision: adapt
    integration_option: eval_harness_adapter
    isolation_tier: ephemeral_worker
    note: "Aligns with eval/ and the untrusted-output gateway. Strong candidates to INTEGRATE as red-team / model-risk evaluators behind adapters."
  D_sast_sca_dast:
    title: "SAST / semantic code analysis / secrets / SCA / SBOM / DAST"
    default_decision: adapt
    integration_option: connector_adapter
    isolation_tier: ephemeral_worker_egress_controlled
    note: "The core scanner-connector layer. Scope-constrained, rate-limited, never pointed at arbitrary internet assets. Several already wrapped by Guardian."
  E_runtime_detection:
    title: "Runtime security / EDR / cloud workload / detection engineering"
    default_decision: adapt
    integration_option: observe_only_adapter
    isolation_tier: isolated_service
    note: "Begin in observe-only / recommend-only mode. Automated containment needs separate approval, blast-radius limits, rollback, tested runbooks."
  F_vulnmgmt_aspm_siem_soar_ti:
    title: "Vuln mgmt / ASPM / ASM / findings correlation / SIEM / SOAR / TI"
    default_decision: federate
    integration_option: federation_adapter
    isolation_tier: isolated_service
    note: "Guardian owns the CANONICAL finding (CanonicalFinding contract); these federate as sources/sinks. Avoid conflicting sources of truth."
  G_policy_identity_secrets_privacy:
    title: "Policy engines / authz / identity / workload identity / secrets / privacy"
    default_decision: reference
    integration_option: compare_no_second_authority
    isolation_tier: n/a
    note: "OPA is already Guardian's policy authority. Do NOT create multiple contradictory decision authorities; identity/secrets/privacy components are adopted where they fill a real gap."
  H_supplychain_signing_provenance:
    title: "Supply-chain security / signatures / provenance / SBOM / secure builds"
    default_decision: adopt
    integration_option: supply_chain_integration
    isolation_tier: n/a
    note: "Guardian must verify what it runs, know its origin and contents, and preserve the attestation chain. Aligns with attestation/ + supplychain/."
  I_sandbox_isolation:
    title: "Sandboxing / isolation / container runtimes / safe execution"
    default_decision: adopt
    integration_option: isolation_tier
    isolation_tier: self
    note: "Choose isolation tier by tool risk. High-risk active testing must not share the Guardian control-plane trust zone (isolation/)."
  J_orchestration_gitops:
    title: "Workflow orchestration / GitOps / deployment / release control"
    default_decision: reference
    integration_option: compare_release_control
    isolation_tier: n/a
    note: "Temporal is already Guardian's durable workflow engine. Check each project's CURRENT licence — public source != OSI/commercially compatible."
  K_telemetry_observability_audit:
    title: "Telemetry / observability / audit / operational evidence"
    default_decision: adopt
    integration_option: observability_integration
    isolation_tier: n/a
    note: "Telemetry must be privacy-filtered, tenant-scoped, tamper-evident where required, and incapable of leaking secrets or protected data."
  L_standards_formats_sim:
    title: "Standards / data formats / threat models / cyber simulation"
    default_decision: adopt
    integration_option: open_format
    isolation_tier: n/a
    note: "Adopt open formats over bespoke coupling. Adversary-emulation systems are high-risk: controlled simulation / isolated cyber-range only."
  M_curated_discovery:
    title: "Curated discovery lists / live GitHub topic surfaces"
    default_decision: reference
    integration_option: discovery_only
    isolation_tier: n/a
    note: "Use only to DISCOVER candidates; independently verify every linked project."

id: credential-token-theft
title: Session token export / theft attempt
severity: high
attack: [T1539]                # Steal Web Session Cookie (defensive mapping)
logsource: application
confidence: 0.8
detection:
  all:
    - { field: event_type, equals: session_token_export }
response:
  action: revoke_token         # reversible; auto (no human approval needed)
  target_field: token_id
tests:
  positive:
    - { event_type: session_token_export, token_id: tok-9, actor: standard_user_test }
  negative:
    - { event_type: login, token_id: tok-9 }

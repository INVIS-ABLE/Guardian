# guardian.config.yaml
# Top-level Guardian configuration. Safe-by-default: dry-run on, staging only,
# production disabled until an approved scope + human approval are present.

guardian:
  version: "0.1.0"
  environment_default: staging
  dry_run_default: true          # never execute live actions unless explicitly disabled
  fail_closed: true              # any guardrail error => refuse the run

  # --- AI / Agent layer -------------------------------------------------------
  agents:
    command_centre: ECC          # ECC is the orchestration / workflow command centre
    framework: custom            # one of: langgraph | crewai | autogen | custom
    reasoning_model:
      provider: claude           # claude | gpt-compatible
      model: claude-opus-4-8
    local_model:
      enabled: false             # optional offline/private analysis model
      model: null
    rag:
      enabled: true
      vector_db: qdrant          # qdrant | weaviate | chroma | pgvector
      collections:
        - invisable_repos
        - policies
        - threat_models
        - app_docs
        - support_flows
        - safeguarding_rules
        - run_outcomes          # Brain run findings/outcomes fed back for learning

  # --- Connectors (security tools) -------------------------------------------
  # Each connector is dry-run aware and refuses to run outside an approved scope.
  connectors:
    codeql:   { enabled: true,  config: codeql/codeql-config.yml }
    semgrep:  { enabled: true,  config: semgrep/semgrep.yml }
    gitleaks: { enabled: true,  config: gitleaks/.gitleaks.toml }
    trivy:    { enabled: true,  config: trivy/trivy.yaml }
    zap:      { enabled: true,  config: zap/staging-baseline.yaml }
    osv:      { enabled: true }
    syft:     { enabled: true }
    grype:    { enabled: true }
    checkov:  { enabled: false }
    playwright: { enabled: true, config: playwright/playwright.config.ts }
    # Credential-audit connectors: AUTHORISED DEFENSIVE USE ONLY. Disabled by default;
    # owned staging + test accounts only, and approval-gated (credential_audit).
    hashcat:  { enabled: false, purpose: password_policy_strength_audit }
    john:     { enabled: false, purpose: password_policy_strength_audit }
    hydra:    { enabled: false, purpose: login_defence_resilience }

  # --- Brain orchestration ----------------------------------------------------
  # The Guardian Brain coordinates the agents through a controlled, gated workflow.
  # It is a "brain, not a supermodel": it stitches proven pieces together, it does
  # not train a model from scratch.
  brain:
    enabled: true
    workflow_engine: builtin       # builtin | langgraph (the legacy linear orchestrator)
    # Bounded reasoning graph (inner) + durable case workflow (outer). See
    # core/brain/graph.py, core/brain/temporal_workflow.py and docs/reasoning_graph.md.
    reasoning_graph:
      engine: langgraph            # LangGraph StateGraph over the typed GuardianCaseState
      durable_workflow: temporal   # Temporal owns retries, suspension and crash-replay
    halt_for_human_approval: true  # hard stop before any deploy stage; cannot disable
    memory_writes: true            # persist detect/simulate/evidence outputs to memory

  # --- Policy gates -----------------------------------------------------------
  # Defence-in-depth on "defensive-only": the central authority core/policy_gate.py
  # (mirrors policies/opa/guardian.rego) + the in-code guardrails wrapper + NeMo rails
  # on the reasoning model. All must agree.
  policy:
    authority: core/policy_gate.py   # the single authorize() path
    opa:
      policy_dir: policies/opa
      # The embedded evaluator mirrors the Rego and is used by default; set
      # GUARDIAN_USE_OPA=1 (with the opa binary present) to delegate to OPA itself.
      use_opa_env: GUARDIAN_USE_OPA
    nemo_guardrails:
      enabled: true
      config_dir: policies/guardrails/nemo

  # --- Evaluation -------------------------------------------------------------
  evaluation:
    deepeval:  { enabled: true, path: eval/deepeval }
    promptfoo: { enabled: true, config: eval/promptfooconfig.yaml }
    ragas:     { enabled: true, path: eval/ragas }

  # --- Self-healing workflow --------------------------------------------------
  self_healing:
    enabled: true
    open_pull_requests: true
    draft_only: true             # all Guardian PRs open as drafts
    require_human_approval: true # cannot be disabled
    deploy:
      feature_flag_required: true
      auto_rollback_on_safety_failure: true

  # --- Reporting / evidence ---------------------------------------------------
  reporting:
    output_dir: reports
    template: reports/templates/report_template.md
    scrub_secrets: true
    formats: [markdown, json]

  # --- Audit / logging --------------------------------------------------------
  audit:
    enabled: true               # every action logged; cannot be disabled in practice
    log_dir: reports/audit
    tamper_evident: true        # hash-chained audit entries

  # --- Monitoring -------------------------------------------------------------
  monitoring:
    sentry: { enabled: false }
    opentelemetry: { enabled: true }
    prometheus: { enabled: true }
    grafana: { enabled: true }
    loki: { enabled: true }
    falco: { enabled: false }   # runtime detection (lab only)
    wazuh: { enabled: false }

name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (local + registry rulesets)
        run: |
          semgrep scan \
            --config semgrep/semgrep.yml \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif --output semgrep.sarif || true

      # Uploading to the Security tab requires code scanning (GitHub Advanced
      # Security), which isn't available on all repos/plans. Don't block the PR if
      # the upload isn't permitted — the scan above is still the gating signal and
      # the SARIF is kept as a build artifact.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      # Renovate digest-pins this image (renovate.json: docker:pinDigests). Suppressed
      # until that first pin PR lands; remove the ignore once it is pinned by sha256.
      image: semgrep/semgrep:latest  # zizmor: ignore[unpinned-images]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Semgrep (local + registry rulesets, blocking on error)
        run: |
          semgrep scan \
            --config semgrep/semgrep.yml \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif --output semgrep.sarif

      # Code scanning is enabled on this repo, so SARIF upload succeeds and is the
      # blocking signal for findings. (Fails closed if upload becomes unavailable.)
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

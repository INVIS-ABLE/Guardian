name: Guardian CI

# Core CI for the Guardian platform: validates guardrails, scope files, and the
# self-healing test gate (unit + security + safeguarding). Encodes steps 5-11 of the
# self-healing workflow (docs/workflow.md).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  guardrails-and-tests:
    name: Guardrails + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (blocking)
        run: ruff check .

      - name: Validate scope files against guardrails
        run: |
          for f in scope/*.yaml; do
            case "$f" in
              scope/assets.yaml|scope/test_accounts.yaml) continue ;;
            esac
            echo "Checking $f"
            python -m core.guardrails check "$f"
          done

      - name: Unit + security + safeguarding tests
        run: pytest -q

      - name: Python security gates (bandit + pip-audit, blocking)
        run: |
          pip install bandit pip-audit
          bandit -r core agents connectors simulators dashboard -ll -q
          pip-audit -r requirements.txt

      - name: Verify audit chain
        run: python -m core.cli audit-verify

  workflow-audit:
    name: Workflow security audit (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: zizmor (blocking)
        run: |
          pip install zizmor==1.26.1
          # Offline = deterministic: the static audits (unpinned-uses, artipacked,
          # excessive-permissions, unpinned-images) need no network. Online advisory
          # audits are enabled separately once Renovate pins refs.
          zizmor --offline --config .github/zizmor.yml .github/workflows

  draft-pr-policy:
    name: Enforce draft + human-review policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Remind that Guardian changes require human approval
        run: |
          echo "Guardian self-healing PRs must:"
          echo " - open as DRAFT"
          echo " - pass the test gate above"
          echo " - receive a recorded HUMAN approval before merge (no auto-merge)"
          echo "Branch protection enforces required reviews; this job is a visible reminder."

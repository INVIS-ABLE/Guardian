name: Repository Governor

# Non-merging governance watchdog (docs/governance/merge_governor.md).
# It DETECTS only — it never merges, changes settings, or deletes anything.
# Least privilege: read the repo, write a check/artifact. No write to contents.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governor:
    name: Repository governor checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Governor self-tests (detectors must work)
        run: python -m pytest tests/test_repository_governor.py -q

      - name: Run governor (report-only, non-blocking)
        id: governor
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          if [ -n "$BASE" ]; then
            python scripts/repository_governor.py --pr-base "$BASE" | tee governor-report.json
          else
            python scripts/repository_governor.py | tee governor-report.json
          fi

      - name: Upload governor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-governor-report
          path: governor-report.json
          if-no-files-found: warn

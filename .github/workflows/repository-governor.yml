name: Repository Governor

# Non-merging governance watchdog (docs/governance/merge_governor.md).
# It DETECTS only — it never merges, changes settings, or deletes anything.
# Least privilege: read the repo, write a check/artifact. No write to contents.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governor:
    name: Repository governor checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        # The governor script is stdlib-only; pytest is needed for the self-tests below.
        run: python -m pip install --upgrade pip pytest

      - name: Governor self-tests (detectors must work)
        # Hermetic: the governor test loads the stdlib-only script via importlib and
        # needs no project deps. --noconftest skips tests/conftest.py (which imports
        # core.* and PyYAML) so the watchdog stays self-contained and fast.
        run: python -m pytest tests/test_repository_governor.py -q --noconftest

      - name: Run governor (report-only, non-blocking)
        id: governor
        env:
          # Pass the base ref through the environment (never inline ${{ }} in run:)
          # to avoid shell template injection — matches the repo's workflow convention.
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ -n "$PR_BASE_REF" ]; then
            python scripts/repository_governor.py --pr-base "$PR_BASE_REF" | tee governor-report.json
          else
            python scripts/repository_governor.py | tee governor-report.json
          fi

      - name: Upload governor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-governor-report
          path: governor-report.json
          if-no-files-found: warn

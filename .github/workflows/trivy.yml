name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy fs + config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy/trivy.yaml
          format: sarif
          output: trivy-results.sarif

      # Code scanning is enabled, so SARIF upload succeeds and is a blocking signal.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: ignore

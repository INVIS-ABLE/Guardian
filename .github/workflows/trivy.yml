name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy fs + config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy/trivy.yaml
          format: sarif
          output: trivy-results.sarif

      # Uploading to the Security tab requires code scanning (GitHub Advanced
      # Security), which isn't available on all repos/plans. Don't block the PR if
      # the upload isn't permitted — keep the SARIF as a build artifact instead.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: ignore

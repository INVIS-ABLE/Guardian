# zizmor configuration — GitHub Actions security audit (blueprint area 10).
#
# Every Action is now pinned to a full commit SHA (resolved via git ls-remote; Renovate
# keeps them current — renovate.json: helpers:pinGitHubActionDigests). The `unpinned-uses`
# policy is therefore set to `hash-pin`: zizmor FAILS if any `uses:` is not pinned to an
# immutable 40-hex commit SHA. (The semgrep container image is digest-pinned by Renovate's
# docker:pinDigests and carries an explicit `zizmor: ignore[unpinned-images]` until then.)
rules:
  unpinned-uses:
    config:
      policies:
        "*": hash-pin   # require an immutable commit-SHA pin for every Action

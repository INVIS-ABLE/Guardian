# Guardian local stack — dashboard + RAG vector DB + monitoring.
# Defensive/observability services only. No service here scans third parties or
# performs offensive actions. Bring up:  docker compose up -d
services:
  guardian-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: invisable/guardian-dashboard:0.1.0
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/app:ro
      - ./reports:/app/reports          # reports are writable
    environment:
      GUARDIAN_ENV: staging
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PW:-change-me}"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  qdrant_data:
  grafana_data:

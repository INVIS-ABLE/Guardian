# Guardian Trivy configuration.
# Scans owned filesystems / repos / containers / IaC for vulnerabilities and
# misconfigurations. Non-destructive and read-only.
severity:
  - MEDIUM
  - HIGH
  - CRITICAL

scan:
  security-checks:
    - vuln
    - secret
    - misconfig
  skip-dirs:
    - node_modules
    - .git
    - playwright-report

vulnerability:
  ignore-unfixed: false

misconfiguration:
  include-non-failures: false

# Fail CI on HIGH/CRITICAL by default (overridable per workflow).
exit-code: 1

# Targeted, justified, time-boxed CVE exceptions (no blanket bypass). See the file's
# header; `ignore-unfixed: false` above means fixable vulnerabilities still gate CI.
ignorefile: .trivyignore.yaml
